<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三角洲行动 · 子弹价格仪表盘 & 管理后台（带时间）</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f0b90b">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0b1118;
            --card-bg: #131e2c;
            --panel-bg: #1a2a3a;
            --border: #2a4055;
            --text: #d0dce8;
            --text-secondary: #8094a8;
            --gold: #f0b90b;
            --green: #2ecc71;
            --red: #e74c3c;
            --blue: #3498db;
            --orange: #e67e22;
            --purple: #9b59b6;
            --accent: #f0b90b;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* 导航 */
        .navbar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 0 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .nav-brand {
            font-weight: 700;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #f0b90b, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }
        .nav-tabs {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .nav-tab {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.25s;
            color: var(--text-secondary);
            border: 1px solid transparent;
            background: transparent;
            white-space: nowrap;
        }
        .nav-tab:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.04);
        }
        .nav-tab.active {
            color: #fff;
            background: var(--panel-bg);
            border-color: var(--border);
            box-shadow: 0 0 12px rgba(240, 185, 11, 0.15);
        }
        .nav-badge {
            background: var(--red);
            color: #fff;
            font-size: 0.7rem;
            padding: 2px 7px;
            border-radius: 10px;
            margin-left: 4px;
        }
        .save-indicator {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .save-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse-dot 2s infinite;
        }
        .save-dot.saving {
            background: var(--orange);
            animation: pulse-dot 0.5s infinite;
        }
        .save-dot.unsaved {
            background: var(--red);
            animation: none;
        }
        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.5); }
            50% { box-shadow: 0 0 0 8px rgba(46, 204, 113, 0); }
        }

        .main-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 25px 20px 40px;
        }
        .view { display: none; }
        .view.active { display: block; }

        /* 仪表盘 */
        .dashboard {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header-row h2 {
            font-weight: 700;
            font-size: 1.5rem;
            color: #fff;
        }
        .header-row .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .chart-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .legend-custom {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            opacity: 1;
            transition: opacity 0.2s;
            user-select: none;
        }
        .legend-item.inactive { opacity: 0.4; }
        .legend-color {
            width: 13px;
            height: 13px;
            border-radius: 3px;
            flex-shrink: 0;
        }
        canvas {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 6px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 16px;
        }
        .stat-card {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 18px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--card-accent, #f0b90b);
            border-radius: 0 2px 2px 0;
        }
        .stat-name {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .stat-price {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
        }
        .stat-change { font-size: 0.85rem; margin-top: 4px; }
        .change-up { color: var(--green); }
        .change-down { color: var(--red); }
        .change-flat { color: #f1c40f; }
        .stat-detail {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            gap: 8px;
            flex-wrap: wrap;
        }
        .table-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            overflow-x: auto;
        }
        .table-card h3 {
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
            font-size: 0.85rem;
        }
        th {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 2px solid var(--border);
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
        }
        td {
            padding: 8px;
            border-bottom: 1px solid #1f3142;
            white-space: nowrap;
        }
        .price-cell { font-weight: 600; }
        .note {
            text-align: center;
            color: #546b7c;
            font-size: 0.78rem;
            margin-top: 8px;
        }

        /* 管理面板 */
        .admin-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .admin-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
        }
        .admin-section h3 {
            margin-bottom: 14px;
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .date-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .date-tag {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 7px 12px;
            font-size: 0.82rem;
            display: flex;
            align-items: center;
            gap: 7px;
            color: var(--text);
            transition: all 0.2s;
        }
        .date-tag .remove-date {
            cursor: pointer;
            color: var(--red);
            font-weight: bold;
            font-size: 0.9rem;
            line-height: 1;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .date-tag .remove-date:hover { opacity: 1; }
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            background: var(--panel-bg);
            color: var(--text);
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn:hover {
            border-color: #5a7a95;
            background: #1f3448;
            color: #fff;
        }
        .btn-primary {
            background: #f0b90b;
            color: #0b1118;
            border-color: #f0b90b;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: #f7c930;
            border-color: #f7c930;
            color: #0b1118;
        }
        .btn-danger {
            background: transparent;
            border-color: var(--red);
            color: var(--red);
        }
        .btn-danger:hover {
            background: var(--red);
            color: #fff;
            border-color: var(--red);
        }
        .btn-sm {
            padding: 5px 10px;
            font-size: 0.75rem;
            border-radius: 6px;
        }
        .btn-xs {
            padding: 3px 8px;
            font-size: 0.7rem;
            border-radius: 4px;
        }
        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .editable-table-wrapper {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .editable-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
            font-size: 0.84rem;
        }
        .editable-table th {
            background: var(--panel-bg);
            padding: 10px 8px;
            border-bottom: 2px solid var(--border);
            color: var(--text-secondary);
            font-weight: 500;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 2;
            white-space: nowrap;
        }
        .editable-table th:first-child {
            text-align: left;
            min-width: 140px;
        }
        .editable-table th:nth-child(2) { min-width: 50px; }
        .editable-table td {
            padding: 5px 4px;
            border-bottom: 1px solid #1f3142;
            text-align: center;
            vertical-align: middle;
        }
        .editable-table td:first-child { text-align: left; }
        .editable-table input[type="text"] {
            width: 100%;
            min-width: 100px;
            padding: 7px 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #0d1a26;
            color: #fff;
            font-size: 0.84rem;
            font-family: inherit;
            text-align: left;
        }
        .editable-table input[type="number"] {
            width: 72px;
            padding: 7px 4px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #0d1a26;
            color: #fff;
            font-size: 0.84rem;
            font-family: inherit;
            text-align: center;
            -moz-appearance: textfield;
        }
        .editable-table input[type="number"]::-webkit-outer-spin-button,
        .editable-table input[type="number"]::-webkit-inner-spin-button {
            opacity: 1;
            height: 24px;
        }
        .editable-table input[type="color"] {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 2px solid var(--border);
            cursor: pointer;
            background: transparent;
            padding: 1px;
        }
        .editable-table input:focus {
            outline: none;
            border-color: #f0b90b;
            box-shadow: 0 0 0 3px rgba(240,185,11,0.1);
        }
        .color-cell {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a2a3a;
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 10px;
            color: #fff;
            font-size: 0.85rem;
            z-index: 999;
            animation: slideUp 0.35s ease-out;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--red); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 密码弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 24px;
            width: 380px;
            max-width: 90vw;
            box-shadow: 0 20px 45px rgba(0,0,0,0.7);
        }
        .modal h3 { margin-bottom: 16px; color: #fff; font-size: 1.1rem; }
        .modal input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #0d1a26;
            color: #fff;
            font-size: 0.9rem;
            margin-bottom: 12px;
            font-family: inherit;
        }
        .modal input[type="password"]:focus {
            outline: none;
            border-color: #f0b90b;
        }
        .modal .btn-row { justify-content: flex-end; }
        .modal .hint {
            font-size: 0.75rem;
            color: #546b7c;
            margin-top: 10px;
        }

        /* 管理面板增强样式 */
        .stat-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .summary-card {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            text-align: center;
        }
        .summary-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: #f0b90b;
        }
        .summary-card .label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .editable-table tr:hover td {
            background: rgba(255,255,255,0.03);
        }
        .btn-danger-soft {
            background: rgba(231,76,60,0.15);
            color: #e74c3c;
            border: 1px solid #e74c3c;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .btn-icon {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-icon:hover {
            background: var(--panel-bg);
            color: #fff;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0 12px;
                height: 50px;
            }
            .nav-tab {
                padding: 7px 12px;
                font-size: 0.78rem;
            }
            .nav-brand { font-size: 1rem; }
            .save-indicator { display: none; }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .stat-price { font-size: 1.3rem; }
            .editable-table input[type="number"] {
                width: 56px;
                padding: 5px 2px;
                font-size: 0.75rem;
            }
            .editable-table input[type="text"] {
                min-width: 70px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <nav class="navbar">
        <span class="nav-brand">🔫 三角洲 · 子弹价格系统</span>
        <div class="nav-tabs">
            <button class="nav-tab active" data-view="dashboard" id="tabDashboard">📊 仪表盘</button>
            <button class="nav-tab" data-view="admin" id="tabAdmin">⚙️ 管理后台</button>
        </div>
        <span class="save-indicator" id="saveIndicator">
            <span class="save-dot" id="saveDot"></span>
            <span id="saveText">已保存</span>
        </span>
    </nav>

    <!-- 主容器 -->
    <div class="main-container">

        <!-- 仪表盘视图 -->
        <div class="view active" id="viewDashboard">
            <div class="dashboard">
                <div class="header-row">
                    <div>
                        <h2>📈 子弹价格趋势对比</h2>
                        <p class="subtitle">交易行每日收盘价 · 可精确到分钟</p>
                    </div>
                </div>
                <div class="chart-card">
                    <div class="chart-header">
                        <span style="font-weight:600;color:#fff;">价格走势图（X轴显示日期+时间）</span>
                        <div class="legend-custom" id="legendContainer"></div>
                    </div>
                    <canvas id="priceChart" height="120"></canvas>
                </div>
                <div class="stats-grid" id="statsGrid"></div>
                <div class="table-card">
                    <h3>📋 每日明细</h3>
                    <table id="detailTable">
                        <thead></thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="note">💡 在管理后台可以添加带时间的日期（如 `07-05 14:30`），数据自动同步到云端。</div>
            </div>
        </div>

        <!-- 管理后台视图 -->
        <div class="view" id="viewAdmin">
            <div class="admin-panel" id="adminContent">
                <!-- 密码验证 -->
                <div id="passwordGate" style="display:flex;align-items:center;justify-content:center;min-height:300px;">
                    <div style="text-align:center;">
                        <h3 style="color:#fff;margin-bottom:10px;">🔐 请输入管理密码</h3>
                        <p style="color:var(--text-secondary);margin-bottom:16px;font-size:0.85rem;">默认密码：<code style="background:#1a2a3a;padding:3px 8px;border-radius:4px;">admin123</code></p>
                        <input type="password" id="passwordInput" placeholder="输入密码..." style="width:240px;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:#0d1a26;color:#fff;font-size:0.9rem;font-family:inherit;text-align:center;">
                        <br><br>
                        <button class="btn btn-primary" onclick="verifyPassword()">进入管理后台</button>
                        <p id="passwordError" style="color:var(--red);font-size:0.8rem;margin-top:8px;display:none;">❌ 密码错误，请重试</p>
                    </div>
                </div>

                <!-- 管理主内容 -->
                <div id="adminMain" style="display:none;">
                    <!-- 数据总览卡片 -->
                    <div class="stat-summary" id="adminSummary"></div>

                    <!-- 日期管理 -->
                    <div class="admin-section">
                        <h3>📅 日期时间管理</h3>
                        <div class="date-tags" id="dateTagsContainer"></div>
                        <div class="btn-row" style="margin-top:10px;">
                            <button class="btn btn-sm" onclick="addDate()">➕ 添加日期</button>
                        </div>
                    </div>

                    <!-- 子弹编辑表格 -->
                    <div class="admin-section">
                        <h3>🔫 子弹与价格编辑</h3>
                        <div class="editable-table-wrapper">
                            <table class="editable-table" id="editableTable">
                                <thead></thead>
                                <tbody></tbody>
                            </table>
                        </div>
                        <div class="btn-row" style="margin-top:12px;">
                            <button class="btn btn-sm" onclick="addBullet()">➕ 添加子弹</button>
                            <button class="btn btn-sm btn-primary" onclick="manualSave()">💾 强制保存</button>
                        </div>
                    </div>

                    <!-- 数据同步中心 -->
                    <div class="admin-section">
                        <h3>🔄 数据同步中心</h3>
                        <div id="syncStatus" style="font-size:0.9rem; color:var(--text-secondary);">加载中...</div>
                        <div class="btn-row" style="margin-top:8px;">
                            <button class="btn btn-sm" onclick="checkSyncStatus()">🔄 刷新状态</button>
                            <button class="btn btn-sm btn-icon" onclick="copyDatabaseURL()" title="复制数据库地址">📋 复制地址</button>
                        </div>
                    </div>

                    <!-- 高级工具区 -->
                    <div class="admin-section">
                        <h3>🛠️ 高级工具</h3>
                        <div class="btn-row">
                            <button class="btn btn-sm" onclick="exportData()">📥 导出 JSON</button>
                            <button class="btn btn-sm" onclick="document.getElementById('importFileInput').click()">📤 导入 JSON</button>
                            <input type="file" id="importFileInput" accept=".json" style="display:none;" onchange="importData(event)">
                            <button class="btn btn-sm btn-danger-soft" onclick="resetData()">🔄 重置数据</button>
                            <button class="btn btn-sm" onclick="changePasswordPrompt()">🔑 修改密码</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div id="toastContainer"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
    (function() {
        // ==================== Firebase 配置 ====================
        const firebaseConfig = {
            apiKey: "AIzaSyAc6QXnTuqUmfhoNVsPuzEpexGhQuLkTms",
            authDomain: "bullet-price.firebaseapp.com",
            databaseURL: "https://bullet-price-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bullet-price",
            storageBucket: "bullet-price.firebasestorage.app",
            messagingSenderId: "193851931243",
            appId: "1:193851931243:web:2f2f8cff852a5e0289cf2e"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ==================== 常量 ====================
        const PASSWORD_KEY = 'df_admin_password';
        const SESSION_VERIFIED = 'df_admin_verified';
        const DEFAULT_PASSWORD = 'admin123';
        const DB_REF_PATH = '/bulletData';

        // 默认数据
        const defaultData = {
            dates: [
                '06-21 14:30', '06-22 14:30', '06-23 14:30', '06-24 14:30',
                '06-25 14:30', '06-26 14:30', '06-27 14:30', '06-28 14:30',
                '06-29 14:30', '06-30 14:30', '07-01 14:30', '07-02 14:30',
                '07-03 14:30', '07-04 14:30'
            ],
            bullets: [
                { name: '5.56×45mm M855', color: '#f0b90b',
                    prices: [320, 328, 315, 302, 310, 334, 345, 340, 355, 348, 362, 370, 359, 375] },
                { name: '7.62×39mm PS', color: '#3498db',
                    prices: [580, 590, 575, 562, 570, 598, 610, 605, 625, 618, 640, 655, 648, 670] },
                { name: '.45 ACP 弹', color: '#e67e22',
                    prices: [210, 218, 212, 205, 215, 225, 220, 230, 228, 240, 245, 238, 250, 255] }
            ]
        };

        let data = JSON.parse(JSON.stringify(defaultData));

        // ==================== Toast ====================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `${type === 'success' ? '✅' : '⚠️'} ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 2200);
        }

        // 保存指示器
        function updateSaveIndicator(status) {
            const dot = document.getElementById('saveDot');
            const text = document.getElementById('saveText');
            dot.classList.remove('saving', 'unsaved');
            if (status === 'saving') {
                dot.classList.add('saving');
                text.textContent = '同步中...';
            } else if (status === 'unsaved') {
                dot.classList.add('unsaved');
                text.textContent = '未保存';
            } else {
                text.textContent = '已同步';
            }
        }

        // 云端操作
        function loadFromCloud(callback) {
            db.ref(DB_REF_PATH).once('value').then(snapshot => {
                const val = snapshot.val();
                if (val && val.dates && val.bullets) {
                    data = val;
                } else {
                    data = JSON.parse(JSON.stringify(defaultData));
                    saveToCloud(data);
                }
                if (callback) callback();
                refreshDashboard();
                updateSaveIndicator('saved');
            }).catch(err => {
                console.error('Firebase 加载失败，使用本地备份', err);
                loadLocalFallback();
                if (callback) callback();
                refreshDashboard();
                updateSaveIndicator('saved');
            });
        }

        function saveToCloud(d) {
            db.ref(DB_REF_PATH).set(d)
                .then(() => updateSaveIndicator('saved'))
                .catch(err => {
                    console.error('保存失败', err);
                    updateSaveIndicator('unsaved');
                });
        }

        function loadLocalFallback() {
            const raw = localStorage.getItem('df_bullet_data_backup');
            if (raw) {
                try {
                    const parsed = JSON.parse(raw);
                    if (parsed.dates && parsed.bullets) data = parsed;
                } catch(e) {}
            }
        }

        function localBackup() {
            localStorage.setItem('df_bullet_data_backup', JSON.stringify(data));
        }

        function listenCloudUpdates() {
            db.ref(DB_REF_PATH).on('value', snapshot => {
                const val = snapshot.val();
                if (val && val.dates && val.bullets) {
                    if (JSON.stringify(val) !== JSON.stringify(data)) {
                        data = val;
                        refreshDashboard();
                        updateSaveIndicator('saved');
                    }
                }
            });
        }

        function manualSave() {
            updateSaveIndicator('saving');
            syncEditableTableToData();
            saveToCloud(data);
            localBackup();
            refreshDashboard();
            showToast('数据已保存到云端');
        }

        let saveTimeout;
        function autoSave() {
            updateSaveIndicator('saving');
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                syncEditableTableToData();
                saveToCloud(data);
                localBackup();
                refreshDashboard();
            }, 600);
        }

        // 同步表格
        function syncEditableTableToData() {
            const tbody = document.querySelector('#editableTable tbody');
            if (!tbody) return;
            const rows = tbody.querySelectorAll('tr');
            for (let bi = 0; bi < data.bullets.length; bi++) {
                const row = rows[bi];
                if (!row) continue;
                const nameInput = row.querySelector('input[data-field="name"]');
                if (nameInput) data.bullets[bi].name = nameInput.value.trim() || data.bullets[bi].name;
                const colorInput = row.querySelector('input[data-field="color"]');
                if (colorInput) data.bullets[bi].color = colorInput.value;
                for (let di = 0; di < data.dates.length; di++) {
                    const priceInput = row.querySelector(`input[data-bi="${bi}"][data-di="${di}"]`);
                    if (priceInput) {
                        const val = parseFloat(priceInput.value);
                        data.bullets[bi].prices[di] = isNaN(val) ? 0 : val;
                    }
                }
            }
        }

        function updateDataFromInput(input) {
            const field = input.getAttribute('data-field');
            const bi = parseInt(input.getAttribute('data-bi'));
            const di = parseInt(input.getAttribute('data-di'));
            if (field === 'name' && bi >= 0 && bi < data.bullets.length) {
                data.bullets[bi].name = input.value.trim() || data.bullets[bi].name;
            } else if (field === 'color' && bi >= 0 && bi < data.bullets.length) {
                data.bullets[bi].color = input.value;
            } else if (di !== undefined && !isNaN(di) && bi >= 0 && bi < data.bullets.length && di >= 0 && di < data.dates.length) {
                const val = parseFloat(input.value);
                data.bullets[bi].prices[di] = isNaN(val) ? 0 : val;
            }
        }

        // ==================== 仪表盘渲染 ====================
        let chartInstance = null;

        function refreshDashboard() {
            buildStats();
            buildDetailTable();
            renderChart();
            buildLegend();
        }

        function formatChange(current, previous) {
            if (previous === undefined || previous === null) return { text: '—', cls: 'change-flat', sign: '' };
            const diff = current - previous;
            const pct = previous !== 0 ? ((diff / previous) * 100).toFixed(2) : '0.00';
            const sign = diff > 0 ? '+' : '';
            const cls = diff > 0 ? 'change-up' : (diff < 0 ? 'change-down' : 'change-flat');
            return { text: `${sign}${diff} (${sign}${pct}%)`, cls, sign };
        }

        function buildStats() {
            const grid = document.getElementById('statsGrid');
            grid.innerHTML = '';
            if (data.bullets.length === 0) {
                grid.innerHTML = '<p style="color:var(--text-secondary);padding:20px;">暂无子弹数据。</p>';
                return;
            }
            data.bullets.forEach(b => {
                const prices = b.prices;
                if (prices.length === 0) return;
                const last = prices[prices.length-1];
                const prev = prices.length >= 2 ? prices[prices.length-2] : undefined;
                const change = formatChange(last, prev);
                const maxP = Math.max(...prices);
                const minP = Math.min(...prices);
                const avg = (prices.reduce((a,b)=>a+b,0)/prices.length).toFixed(0);
                grid.innerHTML += `
                    <div class="stat-card" style="--card-accent: ${b.color};">
                        <div class="stat-name">${escapeHTML(b.name)}</div>
                        <div class="stat-price">₽${last}</div>
                        <div class="stat-change ${change.cls}">
                            ${change.text === '—' ? '➡️ 无变化' : (change.text.includes('+') ? '📈 ' + change.text : '📉 ' + change.text)}
                        </div>
                        <div class="stat-detail">
                            <span>最高 ₽${maxP}</span>
                            <span>最低 ₽${minP}</span>
                            <span>均价 ₽${avg}</span>
                        </div>
                    </div>
                `;
            });
        }

        function buildDetailTable() {
            const thead = document.querySelector('#detailTable thead');
            const tbody = document.querySelector('#detailTable tbody');
            if (data.bullets.length === 0 || data.dates.length === 0) {
                thead.innerHTML = '<tr><th>日期</th></tr>';
                tbody.innerHTML = '<tr><td>暂无数据</td></tr>';
                return;
            }
            let headHtml = '<tr><th>日期+时间</th>';
            data.bullets.forEach(b => headHtml += `<th>${escapeHTML(b.name)} (₽)</th>`);
            headHtml += '</tr>';
            thead.innerHTML = headHtml;
            let bodyHtml = '';
            for (let i = 0; i < data.dates.length; i++) {
                bodyHtml += `<tr><td><strong>${escapeHTML(data.dates[i])}</strong></td>`;
                data.bullets.forEach(b => {
                    const price = b.prices[i] !== undefined ? b.prices[i] : '-';
                    let cls = '';
                    if (i > 0 && b.prices[i] !== undefined && b.prices[i-1] !== undefined) {
                        const diff = b.prices[i] - b.prices[i-1];
                        cls = diff > 0 ? 'change-up' : (diff < 0 ? 'change-down' : '');
                    }
                    bodyHtml += `<td class="price-cell ${cls}">${typeof price === 'number' ? '₽'+price : price}</td>`;
                });
                bodyHtml += '</tr>';
            }
            tbody.innerHTML = bodyHtml;
        }

        function renderChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            if (data.bullets.length === 0 || data.dates.length === 0) return;
            const datasets = data.bullets.map(b => {
                const pointColors = b.prices.map((p, idx) => {
                    if (idx === 0) return b.color;
                    return p >= b.prices[idx-1] ? '#2ecc71' : '#e74c3c';
                });
                return {
                    label: b.name,
                    data: b.prices,
                    borderColor: b.color,
                    backgroundColor: 'transparent',
                    borderWidth: 2.5,
                    tension: 0.3,
                    pointBackgroundColor: pointColors,
                    pointBorderColor: '#ffffff',
                    pointBorderWidth: 1.2,
                    pointRadius: 4.5,
                    pointHoverRadius: 7,
                };
            });
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: data.dates, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#8094a8', maxRotation: 45 }, grid: { color: '#1f3142' } },
                        y: { beginAtZero: false, ticks: { color: '#8094a8', callback: v => '₽'+v }, grid: { color: '#1f3142' } }
                    }
                }
            });
        }

        function buildLegend() {
            const container = document.getElementById('legendContainer');
            container.innerHTML = '';
            if (!chartInstance) return;
            data.bullets.forEach((b, index) => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `<span class="legend-color" style="background:${b.color};"></span>${escapeHTML(b.name)}`;
                item.addEventListener('click', () => {
                    const meta = chartInstance.getDatasetMeta(index);
                    meta.hidden = !meta.hidden;
                    item.classList.toggle('inactive', meta.hidden);
                    chartInstance.update();
                });
                container.appendChild(item);
            });
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ==================== 管理面板 ====================
        function renderDateTags() {
            const container = document.getElementById('dateTagsContainer');
            container.innerHTML = '';
            data.dates.forEach((d, i) => {
                const tag = document.createElement('span');
                tag.className = 'date-tag';
                tag.innerHTML = `${escapeHTML(d)} <span class="remove-date" data-di="${i}">✕</span>`;
                container.appendChild(tag);
            });
        }

        function renderEditableTable() {
            syncEditableTableToData();
            const thead = document.querySelector('#editableTable thead');
            const tbody = document.querySelector('#editableTable tbody');
            let headHtml = '<tr><th>子弹名称</th><th>颜色</th>';
            data.dates.forEach(d => headHtml += `<th>${escapeHTML(d)}</th>`);
            headHtml += '<th>操作</th></tr>';
            thead.innerHTML = headHtml;
            let bodyHtml = '';
            data.bullets.forEach((b, bi) => {
                bodyHtml += '<tr>';
                bodyHtml += `<td><input type="text" data-field="name" data-bi="${bi}" value="${escapeHTML(b.name)}"></td>`;
                bodyHtml += `<td class="color-cell"><input type="color" data-field="color" data-bi="${bi}" value="${b.color}"></td>`;
                data.dates.forEach((d, di) => {
                    bodyHtml += `<td style="display:flex; align-items:center; justify-content:center; gap:2px;">
    <input type="number" data-bi="${bi}" data-di="${di}" value="${b.prices[di]||0}" step="1" style="width:60px;">
    <span style="cursor:pointer; color:#e74c3c; font-weight:bold; font-size:0.8rem;" 
          onclick="removePrice(${bi},${di})" title="清空此价格">✕</span>
</td>`;
                });
                bodyHtml += `<td><button class="btn-danger-soft" onclick="removeBullet(${bi})">🗑 删除</button></td>`;
                bodyHtml += '</tr>';
            });
            tbody.innerHTML = bodyHtml;
            tbody.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', function() { updateDataFromInput(this); autoSave(); });
                input.addEventListener('change', function() { updateDataFromInput(this); autoSave(); });
            });
        }

        // 数据总览卡片
        function renderAdminSummary() {
            const container = document.getElementById('adminSummary');
            if (!container) return;
            container.innerHTML = `
                <div class="summary-card">
                    <div class="value">${data.bullets.length}</div>
                    <div class="label">子弹种类</div>
                </div>
                <div class="summary-card">
                    <div class="value">${data.dates.length}</div>
                    <div class="label">记录天数</div>
                </div>
                <div class="summary-card">
                    <div class="value" id="syncTimeSummary">加载中…</div>
                    <div class="label">最后同步</div>
                </div>
                <div class="summary-card">
                    <div class="value">v2.0</div>
                    <div class="label">数据版本</div>
                </div>
            `;
            db.ref('/bulletData/lastOcrSync').once('value').then(snapshot => {
                const sync = snapshot.val();
                const timeStr = sync ? new Date(sync.timestamp).toLocaleString('zh-CN') : '从未';
                const el = document.getElementById('syncTimeSummary');
                if (el) el.textContent = timeStr;
            });
        }

        // 同步状态显示
        function checkSyncStatus() {
            const statusDiv = document.getElementById('syncStatus');
            statusDiv.innerHTML = '检查中...';
            db.ref('/bulletData/lastOcrSync').once('value').then(snapshot => {
                const sync = snapshot.val();
                if (sync) {
                    const time = new Date(sync.timestamp).toLocaleString('zh-CN');
                    const status = sync.status === 'success' ? '✅ 成功' : '❌ 失败';
                    statusDiv.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span><strong>最后同步：</strong>${time}</span>
                            <span>${status}</span>
                        </div>
                        <div style="margin-top:4px;">来源：${sync.source || '未知'}</div>
                    `;
                } else {
                    statusDiv.innerHTML = '暂无同步记录，运行 Python 脚本后会自动显示';
                }
            }).catch(err => {
                statusDiv.innerHTML = '读取失败，请检查网络';
                console.error(err);
            });
        }

        // 复制数据库地址
        function copyDatabaseURL() {
            const url = 'https://bullet-price-default-rtdb.asia-southeast1.firebasedatabase.app';
            navigator.clipboard.writeText(url).then(() => {
                showToast('数据库地址已复制');
            }).catch(() => {
                showToast('复制失败，请手动复制', 'error');
            });
        }

        function refreshAdminPanel() {
            renderAdminSummary();
            renderDateTags();
            renderEditableTable();
            checkSyncStatus();
        }

        // 管理操作
        function addDate() { /* 保持不变 */ 
            syncEditableTableToData();
            const newDate = prompt('请输入新日期+时间（格式：MM-DD HH:mm）：', '');
            if (!newDate) return;
            if (data.dates.includes(newDate)) { showToast('该时间已存在', 'error'); return; }
            data.dates.push(newDate);
            data.bullets.forEach(b => b.prices.push(b.prices.length>0 ? b.prices[b.prices.length-1] : 100));
            refreshAdminPanel();
            saveToCloud(data); localBackup();
        }

        function removeDate(di) {
            syncEditableTableToData();
            if (!confirm('确定删除该时间点？')) return;
            data.dates.splice(di, 1);
            data.bullets.forEach(b => b.prices.splice(di, 1));
            refreshAdminPanel();
            saveToCloud(data); localBackup();
        }

        function addBullet() {
            syncEditableTableToData();
            const name = prompt('子弹名称：', '');
            if (!name) return;
            const color = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
            data.bullets.push({ name, color, prices: new Array(data.dates.length).fill(100) });
            refreshAdminPanel();
            saveToCloud(data); localBackup();
        }

        function removeBullet(bi) {
            syncEditableTableToData();
            if (!confirm(`确定删除 ${data.bullets[bi].name}？`)) return;
            data.bullets.splice(bi, 1);
            refreshAdminPanel();
            saveToCloud(data); localBackup();
        }
        function removePrice(bi, di) {
    if (bi < 0 || bi >= data.bullets.length || di < 0 || di >= data.dates.length) return;
    syncEditableTableToData(); // 先保存当前编辑
    // 如果该价格已经是0，就不重复操作
    if (data.bullets[bi].prices[di] === 0) {
        showToast('价格已经是0', 'error');
        return;
        }
    if (!confirm(`确定清空 ${data.bullets[bi].name} 在 ${data.dates[di]} 的价格吗？`)) return;
    data.bullets[bi].prices[di] = 0;
    saveToCloud(data);
    localBackup();
    refreshAdminPanel();
    showToast('价格已清空');
        }

        function exportData() {
            syncEditableTableToData();
            const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'bullet-data.json';
            a.click();
            showToast('导出成功');
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!imported.dates || !imported.bullets) throw new Error();
                    if (!confirm('覆盖当前数据？')) return;
                    data = imported;
                    saveToCloud(data); localBackup();
                    refreshAdminPanel(); refreshDashboard();
                    showToast('导入成功');
                } catch { showToast('文件格式错误', 'error'); }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function resetData() {
            if (!confirm('重置为默认数据？所有修改将丢失！')) return;
            data = JSON.parse(JSON.stringify(defaultData));
            saveToCloud(data); localBackup();
            refreshAdminPanel(); refreshDashboard();
            showToast('已重置');
        }

        function changePasswordPrompt() {
            const cur = prompt('当前密码：');
            if (!cur) return;
            const stored = localStorage.getItem(PASSWORD_KEY) || DEFAULT_PASSWORD;
            if (cur !== stored) { showToast('密码错误', 'error'); return; }
            const newP = prompt('新密码（至少4位）：');
            if (!newP || newP.length<4) { showToast('至少4位', 'error'); return; }
            const confirm = prompt('确认新密码：');
            if (newP !== confirm) { showToast('不匹配', 'error'); return; }
            localStorage.setItem(PASSWORD_KEY, newP);
            showToast('密码已修改');
        }

        function verifyPassword() {
            const input = document.getElementById('passwordInput');
            if (input.value === (localStorage.getItem(PASSWORD_KEY) || DEFAULT_PASSWORD)) {
                sessionStorage.setItem(SESSION_VERIFIED, 'true');
                document.getElementById('passwordGate').style.display = 'none';
                document.getElementById('adminMain').style.display = 'block';
                refreshAdminPanel();
                showToast('验证成功');
            } else {
                document.getElementById('passwordError').style.display = 'block';
                input.select();
            }
        }

        function checkAdminAccess() {
            if (sessionStorage.getItem(SESSION_VERIFIED)) {
                document.getElementById('passwordGate').style.display = 'none';
                document.getElementById('adminMain').style.display = 'block';
                refreshAdminPanel();
            }
        }

        // 视图切换
        function switchView(view) {
            if (view === 'admin') {
                syncEditableTableToData();
                checkAdminAccess();
            } else {
                syncEditableTableToData();
                saveToCloud(data); localBackup();
                refreshDashboard();
            }
            document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
            document.getElementById(view==='dashboard'?'viewDashboard':'viewAdmin').classList.add('active');
            document.getElementById(view==='dashboard'?'tabDashboard':'tabAdmin').classList.add('active');
        }

        // 事件绑定
        document.getElementById('tabDashboard').addEventListener('click', ()=>switchView('dashboard'));
        document.getElementById('tabAdmin').addEventListener('click', ()=>switchView('admin'));
        document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key==='Enter') verifyPassword(); });
        document.getElementById('dateTagsContainer').addEventListener('click', e => {
            if (e.target.classList.contains('remove-date')) {
                const di = parseInt(e.target.dataset.di);
                if (!isNaN(di)) removeDate(di);
            }
        });
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key==='s') {
                e.preventDefault();
                syncEditableTableToData();
                manualSave();
            }
        });

        // 暴露全局函数
        window.verifyPassword = verifyPassword;
        window.addDate = addDate;
        window.addBullet = addBullet;
        window.manualSave = manualSave;
        window.exportData = exportData;
        window.resetData = resetData;
        window.changePasswordPrompt = changePasswordPrompt;
        window.removeBullet = removeBullet;
        window.removePrice = removePrice;
        window.copyDatabaseURL = copyDatabaseURL;
        window.checkSyncStatus = checkSyncStatus;

        // 启动
        function init() {
            updateSaveIndicator('saving');
            loadFromCloud(() => {
                listenCloudUpdates();
                if (sessionStorage.getItem(SESSION_VERIFIED)) checkAdminAccess();
                updateSaveIndicator('saved');
            });
        }
        init();

        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker 注册成功'))
                .catch(err => console.error('Service Worker 注册失败', err));
        }

        console.log('🔫 三角洲 · 子弹价格系统（云同步版）已就绪');
    })();
    </script>
</body>
</html>
